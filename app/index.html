<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>シールカウンター - ヤマザキ春のパンまつり</title>

  <meta name="description" content="ヤマザキ春のパンまつり シールポイント計算ツール">
  <meta name="theme-color" content="#E5005A">
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap">
  <link rel="stylesheet" href="style.css">
</head>
<body class="font-sans min-h-screen">
  <div id="app" class="min-h-screen flex flex-col max-w-lg mx-auto">

    <!-- ヘッダー -->
    <header class="text-white px-5 pb-5 shadow-md">
      <div class="flex justify-between items-center">
        <div>
          <h1 class="text-lg font-extrabold tracking-tight">シールカウンター</h1>
          <div class="flex items-center mt-0.5">
            <span id="model-status" class="flex items-center text-2xs" style="gap:5px; color: rgba(255,255,255,0.6);">
              <span class="status-dot"></span>
              <span class="status-text"></span>
            </span>
          </div>
        </div>
        <button id="btn-reset" class="btn-reset-header p-2 rounded-full focus:outline-none" title="リセット">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
          </svg>
        </button>
      </div>
    </header>

    <!-- 進捗カード -->
    <div class="px-4 -mt-3 relative" style="z-index:10;">
      <section id="progress-section" class="ui-card p-4">
        <div class="flex justify-between items-end mb-2">
          <div>
            <p class="text-2xs font-bold mb-0.5" style="color:#9ca3af;">現在の合計</p>
            <div class="flex items-baseline" style="gap:4px;">
              <span class="text-3xl font-black" id="total-points" style="color:var(--pink);">0</span>
              <span class="text-sm font-bold" style="color:#9ca3af;">/ 30 点</span>
            </div>
          </div>
          <div class="px-3 py-1 rounded-full text-sm font-bold" style="background:var(--blue-light); color:var(--blue); border:1px solid #cce2ff;">
            お皿 <span id="plates-earned">0</span> 枚分
          </div>
        </div>
        <div class="w-full rounded-full h-2.5 overflow-hidden" style="background:var(--gray);">
          <div id="progress-bar" class="h-2.5 rounded-full" style="width: 0%"></div>
        </div>
        <p id="progress-message" class="text-xs font-bold mt-1.5 text-right" style="color:var(--pink);">あと 30 点</p>
      </section>
    </div>

    <!-- 撮影・スキャンエリア -->
    <section id="capture-section" class="px-4 mt-4">

      <!-- ステップインジケーター -->
      <div class="step-indicator mb-4 px-2">
        <div class="step-item active" id="ui-step-1">
          <div class="step-number">1</div>
          <div class="step-label">撮影</div>
        </div>
        <div class="step-connector" id="ui-conn-1"></div>
        <div class="step-item" id="ui-step-2">
          <div class="step-number">2</div>
          <div class="step-label">スキャン</div>
        </div>
        <div class="step-connector" id="ui-conn-2"></div>
        <div class="step-item" id="ui-step-3">
          <div class="step-number">3</div>
          <div class="step-label">確認・決定</div>
        </div>
      </div>

      <!-- カメラカード -->
      <div class="ui-card overflow-hidden mb-3">
        <div id="camera-container" class="relative bg-gray-200 overflow-hidden" style="aspect-ratio:16/9;">
          <video id="camera-preview" class="w-full h-full object-cover hidden" autoplay playsinline></video>
          <canvas id="capture-canvas" class="hidden"></canvas>
          <img id="captured-image" class="w-full h-full object-contain hidden" alt="">

          <canvas id="detect-overlay" class="absolute inset-0 w-full h-full object-contain hidden"></canvas>

          <!-- プレースホルダー -->
          <div id="camera-placeholder" class="absolute inset-0 flex flex-col items-center justify-center">
            <div class="w-14 h-14 rounded-full flex items-center justify-center mb-2" style="background:var(--pink-muted);">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor" style="color:var(--pink);">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
              </svg>
            </div>
            <p class="text-xs font-bold text-gray-400">カメラを起動 or ギャラリーから選択</p>
          </div>

          <!-- 撮影ガイド -->
          <div id="shooting-guide" class="absolute inset-0 bg-black bg-opacity-60 flex flex-col items-center justify-center text-white hidden z-10">
            <div class="border-2 border-white border-dashed rounded-lg w-3/4 h-2/3 flex items-center justify-center mb-3 opacity-60">
              <p class="text-sm text-center px-4">シールが枠内に<br>収まるように</p>
            </div>
            <p class="text-xs text-gray-300 mb-2">真上からシール全体がはっきり写るように撮影</p>
            <button id="guide-dismiss" class="text-xs text-gray-400 underline">今後表示しない</button>
          </div>

        </div>

        <!-- カメラ操作ボタン (Step 1) -->
        <div id="camera-buttons" class="p-3 flex" style="gap:8px; background:var(--pink-bg);">
          <button id="btn-camera" class="flex-1 btn-primary py-3 rounded-xl font-bold text-sm flex items-center justify-center" style="gap:6px;">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
            撮影
          </button>
          <button id="btn-gallery" class="flex-1 btn-primary py-3 rounded-xl font-bold text-sm flex items-center justify-center" style="gap:6px; background:var(--blue); box-shadow:0 4px 0 var(--blue-dark);">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
            </svg>
            ギャラリー
          </button>
          <input type="file" id="file-input" accept="image/*" class="hidden">
          <input type="file" id="camera-input" accept="image/*" capture="environment" class="hidden">
        </div>
      </div>

      <!-- スキャンカード (Step 2) — 画像読み込み後に表示 -->
      <div id="scan-card" class="ui-card p-3 mb-3 hidden" style="background:var(--blue-light); border:1px solid #cce2ff;">
        <div class="mb-2">
          <span class="text-2xs font-bold" style="color:var(--blue);">STEP 2 : スキャン</span>
        </div>
        <div class="flex items-center" style="gap:8px;">
          <button id="btn-scan" class="flex-1 btn-action py-3 rounded-xl font-bold text-sm" disabled>
            スキャンする
          </button>
          <button id="btn-retake" class="btn-secondary py-3 px-4 rounded-xl font-bold text-sm" style="color:var(--red); border-color:var(--pink-muted);">
            撮り直す
          </button>
          <div id="scan-status" class="hidden flex items-center px-3" style="gap:8px;">
            <div class="w-4 h-4 border-2 border-t-transparent rounded-full animate-spin" style="border-color:var(--blue); border-top-color:transparent;"></div>
            <span class="text-xs" style="color:var(--blue);">認識中...</span>
          </div>
        </div>
      </div>

      <!-- 検出結果エリア (Step 3) -->
      <div id="detect-results" class="hidden mb-3">
        <div class="ui-card p-4" style="border:1px solid var(--pink-muted);">
          <div class="flex justify-between items-center mb-2">
            <span class="text-2xs font-bold" style="color:var(--pink);">STEP 3 : 確認・決定</span>
            <span id="detect-stats" class="text-xs text-gray-400"></span>
          </div>
          <div id="detect-breakdown" class="text-2xs text-gray-400 mt-0.5"></div>
          <div id="detection-list" class="space-y-1 max-h-40 overflow-y-auto mb-3">
          </div>
          <div class="flex" style="gap:8px;">
            <button id="btn-confirm-detections" class="flex-1 btn-primary py-3 rounded-xl font-bold text-sm">
              この内容で決定する
            </button>
            <button id="btn-retake-step3" class="py-3 px-4 rounded-xl font-bold text-sm border" style="color:var(--red); border-color:var(--pink-muted); background:white;">
              撮り直す
            </button>
          </div>
        </div>
      </div>
    </section>

    <!-- シール一覧 -->
    <section id="seal-list-section" class="flex-grow px-4 pt-4 pb-2">
      <div class="flex justify-between items-center mb-3">
        <h2 class="text-sm font-bold" style="color:var(--dark);">登録済みシール</h2>
        <span id="seal-count" class="text-xs font-bold px-2 py-0.5 rounded-full" style="background:var(--pink-muted); color:var(--pink);">0 枚</span>
      </div>
      <div id="seal-breakdown" class="text-2xs text-gray-400 -mt-1 mb-2"></div>
      <div id="seal-list" class="space-y-2">
      </div>
      <div id="seal-empty" class="text-center py-8">
        <p class="text-sm text-gray-300">まだシールが登録されていません</p>
      </div>
    </section>

    <!-- 点数クイック入力 -->
    <section id="quick-input-section" class="px-4 pb-2">
      <p class="text-2xs font-bold mb-2" style="color:#9ca3af; letter-spacing:0.05em;">手動ポイント追加</p>
      <div class="grid grid-cols-6 gap-2">
        <button class="point-btn" data-point="0.5">0.5</button>
        <button class="point-btn" data-point="1">1</button>
        <button class="point-btn" data-point="1.5">1.5</button>
        <button class="point-btn" data-point="2">2</button>
        <button class="point-btn" data-point="2.5">2.5</button>
        <button class="point-btn" data-point="3">3</button>
      </div>
    </section>

    <!-- フッター -->
    <footer class="p-6 pb-safe text-center">
      <p class="text-2xs leading-relaxed" style="color:#ccc;">
        ※ ヤマザキ製パン株式会社との関連はありません
      </p>
    </footer>
  </div>

  <!-- 点数選択モーダル -->
  <div id="point-modal" class="fixed inset-0 bg-black bg-opacity-30 flex items-end justify-center z-50 hidden">
    <div class="bg-white rounded-t-2xl w-full max-w-lg p-6 pb-8">
      <div class="w-10 h-1 bg-gray-300 rounded-full mx-auto mb-4"></div>
      <h3 class="text-center font-bold text-gray-700 mb-4">このシールの点数は？</h3>
      <div class="grid grid-cols-3 gap-3 mb-4">
        <button class="modal-point-btn" data-point="0.5">
          <span class="text-2xl font-bold">0.5</span>
          <span class="text-xs text-gray-400">点</span>
        </button>
        <button class="modal-point-btn" data-point="1">
          <span class="text-2xl font-bold">1</span>
          <span class="text-xs text-gray-400">点</span>
        </button>
        <button class="modal-point-btn" data-point="1.5">
          <span class="text-2xl font-bold">1.5</span>
          <span class="text-xs text-gray-400">点</span>
        </button>
        <button class="modal-point-btn" data-point="2">
          <span class="text-2xl font-bold">2</span>
          <span class="text-xs text-gray-400">点</span>
        </button>
        <button class="modal-point-btn" data-point="2.5">
          <span class="text-2xl font-bold">2.5</span>
          <span class="text-xs text-gray-400">点</span>
        </button>
        <button class="modal-point-btn" data-point="3">
          <span class="text-2xl font-bold">3</span>
          <span class="text-xs text-gray-400">点</span>
        </button>
      </div>
      <button id="btn-modal-cancel" class="w-full py-3 text-gray-500 text-sm font-bold">キャンセル</button>
    </div>
  </div>

  <!-- リセット確認モーダル -->
  <div id="reset-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
    <div class="bg-white rounded-2xl w-80 p-6 shadow-xl">
      <h3 class="text-center font-bold text-gray-800 mb-2">リセットしますか？</h3>
      <p class="text-center text-sm text-gray-500 mb-6">登録したシールをすべて削除します。この操作は元に戻せません。</p>
      <div class="flex gap-3">
        <button id="btn-reset-cancel" class="flex-1 py-2.5 rounded-xl border border-gray-300 text-gray-600 font-bold text-sm">キャンセル</button>
        <button id="btn-reset-confirm" class="flex-1 py-2.5 rounded-xl text-white font-bold text-sm" style="background:var(--red);">リセット</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
