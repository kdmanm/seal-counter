<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>シールカウンター - ヤマザキ春のパンまつり</title>

  <meta name="description" content="ヤマザキ春のパンまつり シールポイント計算ツール">
  <meta name="theme-color" content="#e11d48">
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap">
  <link rel="stylesheet" href="style.css">
</head>
<body class="font-sans bg-gray-50 text-gray-900 min-h-screen">
  <div id="app" class="min-h-screen flex flex-col max-w-lg mx-auto">

    <!-- ヘッダー -->
    <header class="bg-rose-600 text-white p-4 shadow-md">
      <div class="flex justify-between items-center">
        <div>
          <h1 class="text-xl font-bold">シールカウンター</h1>
          <div class="flex items-center gap-2">
            <p class="text-rose-200 text-xs">ヤマザキ春のパンまつり 2026</p>
            <span id="model-status" class="text-xs text-rose-300"></span>
          </div>
        </div>
        <button id="btn-reset" class="p-2 rounded-full hover:bg-rose-700 focus:outline-none" title="リセット">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
          </svg>
        </button>
      </div>
    </header>

    <!-- 進捗エリア -->
    <section id="progress-section" class="bg-white shadow-sm p-4">
      <div class="flex justify-between items-end mb-2">
        <div>
          <span class="text-3xl font-bold text-rose-600" id="total-points">0</span>
          <span class="text-gray-500 text-sm"> / 30 点</span>
        </div>
        <div id="plate-count" class="text-sm text-gray-500">
          お皿 <span class="font-bold text-rose-600" id="plates-earned">0</span> 枚分
        </div>
      </div>
      <div class="w-full bg-gray-200 rounded-full h-3 overflow-hidden">
        <div id="progress-bar" class="bg-rose-500 h-3 rounded-full transition-all duration-500 ease-out" style="width: 0%"></div>
      </div>
      <p id="progress-message" class="text-xs text-gray-400 mt-1 text-right">あと 30 点</p>
    </section>

    <!-- 撮影エリア -->
    <section id="capture-section" class="p-4">
      <div id="camera-container" class="relative bg-gray-200 rounded-xl overflow-hidden aspect-video mb-3">
        <video id="camera-preview" class="w-full h-full object-cover hidden" autoplay playsinline></video>
        <canvas id="capture-canvas" class="hidden"></canvas>
        <img id="captured-image" class="w-full h-full object-contain hidden" alt="撮影画像">

        <!-- 検出結果オーバーレイ Canvas -->
        <canvas id="detect-overlay" class="absolute inset-0 w-full h-full object-contain hidden"></canvas>

        <!-- 初期状態プレースホルダー -->
        <div id="camera-placeholder" class="absolute inset-0 flex flex-col items-center justify-center text-gray-400">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
          </svg>
          <p class="text-sm">シールを撮影またはカメラを起動</p>
        </div>

        <!-- 撮影ガイド -->
        <div id="shooting-guide" class="absolute inset-0 bg-black bg-opacity-60 flex flex-col items-center justify-center text-white hidden z-10">
          <div class="border-2 border-white border-dashed rounded-lg w-3/4 h-2/3 flex items-center justify-center mb-3 opacity-60">
            <p class="text-sm text-center px-4">シールが枠内に<br>収まるように</p>
          </div>
          <p class="text-xs text-gray-300 mb-2">真上からシール全体がはっきり写るように撮影</p>
          <button id="guide-dismiss" class="text-xs text-gray-400 underline">今後表示しない</button>
        </div>

        <!-- 連続スキャンインジケーター -->
        <div id="continuous-indicator" class="absolute top-2 left-2 hidden z-10 flex items-center gap-1.5 bg-black bg-opacity-60 rounded-full px-3 py-1">
          <span class="w-2 h-2 bg-red-500 rounded-full continuous-pulse"></span>
          <span class="text-white text-xs font-bold">連続認識中</span>
        </div>

        <!-- タップマーカーオーバーレイ -->
        <div id="marker-overlay" class="absolute inset-0 hidden" style="touch-action: none;"></div>
      </div>

      <!-- 撮影ボタン群 -->
      <div id="camera-buttons" class="flex gap-2 mb-3">
        <button id="btn-live-camera" class="flex-1 bg-rose-600 text-white py-3 rounded-xl font-bold text-sm shadow-md active:bg-rose-700 transition-colors flex items-center justify-center gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" />
          </svg>
          ライブカメラ
        </button>
        <button id="btn-camera" class="bg-gray-200 text-gray-700 py-3 px-4 rounded-xl font-bold text-sm active:bg-gray-300 transition-colors" title="撮影">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
          </svg>
        </button>
        <button id="btn-gallery" class="bg-gray-200 text-gray-700 py-3 px-4 rounded-xl font-bold text-sm active:bg-gray-300 transition-colors" title="ギャラリー">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
          </svg>
        </button>
        <input type="file" id="file-input" accept="image/*" class="hidden">
        <input type="file" id="camera-input" accept="image/*" capture="environment" class="hidden">
      </div>

      <!-- スキャンモード切替 -->
      <div id="scan-mode-toggle" class="flex rounded-xl overflow-hidden border border-gray-300 mb-3">
        <button id="btn-mode-single" class="flex-1 py-2 text-sm font-bold text-center scan-mode-active">1枚スキャン</button>
        <button id="btn-mode-continuous" class="flex-1 py-2 text-sm font-bold text-center scan-mode-inactive">連続スキャン</button>
      </div>

      <!-- スキャンボタン + ステータス -->
      <div class="flex gap-2 mb-3">
        <button id="btn-scan" class="flex-1 bg-green-600 text-white py-3 rounded-xl font-bold text-sm shadow-md active:bg-green-700 transition-colors disabled:opacity-40 disabled:cursor-not-allowed" disabled>
          スキャンする
        </button>
        <div id="scan-status" class="hidden flex items-center gap-2 px-3">
          <div class="w-4 h-4 border-2 border-green-500 border-t-transparent rounded-full animate-spin"></div>
          <span class="text-xs text-gray-500">認識中...</span>
        </div>
      </div>

      <!-- 連続スキャン統計 -->
      <div id="continuous-stats" class="hidden text-center text-sm text-gray-500 mb-2">
        <span id="continuous-detected">0</span> 枚検出 / <span id="continuous-confirmed">0</span> 枚確定
      </div>

      <!-- 撮影後アクション -->
      <div id="post-capture-actions" class="hidden gap-2 mb-3">
        <button id="btn-confirm-marks" class="flex-1 bg-rose-600 text-white py-3 rounded-xl font-bold text-sm shadow-md active:bg-rose-700 transition-colors">
          マークを確定
        </button>
        <button id="btn-retake" class="bg-gray-200 text-gray-700 py-3 px-4 rounded-xl font-bold text-sm active:bg-gray-300 transition-colors">
          撮り直す
        </button>
      </div>

      <!-- 検出結果エリア -->
      <div id="detect-results" class="hidden mb-3">
        <div class="flex justify-between items-center mb-2">
          <span id="detect-stats" class="text-xs text-gray-500"></span>
        </div>
        <div id="detection-list" class="space-y-1 max-h-40 overflow-y-auto mb-2">
        </div>
        <button id="btn-confirm-detections" class="w-full bg-green-600 text-white py-3 rounded-xl font-bold text-sm shadow-md active:bg-green-700 transition-colors">
          検出結果を確定
        </button>
      </div>
    </section>

    <!-- 点数クイック入力 -->
    <section id="quick-input-section" class="px-4 pb-2">
      <p class="text-xs text-gray-400 mb-2">タップで点数を追加（手動入力）</p>
      <div class="grid grid-cols-6 gap-2">
        <button class="point-btn" data-point="0.5">0.5</button>
        <button class="point-btn" data-point="1">1</button>
        <button class="point-btn" data-point="1.5">1.5</button>
        <button class="point-btn" data-point="2">2</button>
        <button class="point-btn" data-point="2.5">2.5</button>
        <button class="point-btn" data-point="3">3</button>
      </div>
    </section>

    <!-- シール一覧 -->
    <section id="seal-list-section" class="flex-grow p-4">
      <div class="flex justify-between items-center mb-2">
        <h2 class="text-sm font-bold text-gray-600">登録シール</h2>
        <span id="seal-count" class="text-xs text-gray-400">0 枚</span>
      </div>
      <div id="seal-list" class="space-y-1">
      </div>
      <div id="seal-empty" class="text-center text-gray-300 py-8">
        <p class="text-sm">まだシールが登録されていません</p>
      </div>
    </section>

    <!-- フッター -->
    <footer class="p-4 text-center text-xs text-gray-300">
      <p>※ ヤマザキ製パン株式会社との関連はありません</p>
    </footer>
  </div>

  <!-- 点数選択モーダル -->
  <div id="point-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-end justify-center z-50 hidden">
    <div class="bg-white rounded-t-2xl w-full max-w-lg p-6 pb-8 transform transition-transform">
      <div class="w-10 h-1 bg-gray-300 rounded-full mx-auto mb-4"></div>
      <h3 class="text-center font-bold text-gray-700 mb-4">このシールの点数は？</h3>
      <div class="grid grid-cols-3 gap-3 mb-4">
        <button class="modal-point-btn" data-point="0.5">
          <span class="text-2xl font-bold">0.5</span>
          <span class="text-xs text-gray-400">点</span>
        </button>
        <button class="modal-point-btn" data-point="1">
          <span class="text-2xl font-bold">1</span>
          <span class="text-xs text-gray-400">点</span>
        </button>
        <button class="modal-point-btn" data-point="1.5">
          <span class="text-2xl font-bold">1.5</span>
          <span class="text-xs text-gray-400">点</span>
        </button>
        <button class="modal-point-btn" data-point="2">
          <span class="text-2xl font-bold">2</span>
          <span class="text-xs text-gray-400">点</span>
        </button>
        <button class="modal-point-btn" data-point="2.5">
          <span class="text-2xl font-bold">2.5</span>
          <span class="text-xs text-gray-400">点</span>
        </button>
        <button class="modal-point-btn" data-point="3">
          <span class="text-2xl font-bold">3</span>
          <span class="text-xs text-gray-400">点</span>
        </button>
      </div>
      <button id="btn-modal-cancel" class="w-full py-3 text-gray-500 text-sm font-bold">キャンセル</button>
    </div>
  </div>

  <!-- リセット確認モーダル -->
  <div id="reset-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
    <div class="bg-white rounded-2xl w-80 p-6 shadow-xl">
      <h3 class="text-center font-bold text-gray-800 mb-2">リセットしますか？</h3>
      <p class="text-center text-sm text-gray-500 mb-6">登録したシールをすべて削除します。この操作は元に戻せません。</p>
      <div class="flex gap-3">
        <button id="btn-reset-cancel" class="flex-1 py-2.5 rounded-xl border border-gray-300 text-gray-600 font-bold text-sm">キャンセル</button>
        <button id="btn-reset-confirm" class="flex-1 py-2.5 rounded-xl bg-red-500 text-white font-bold text-sm">リセット</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
